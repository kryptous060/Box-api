name: Build Box API APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger a build from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Ensures external C++ engine dependencies pull down properly

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Box uses native components requiring the Android NDK 
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.1.8937393"

    - name: Make Gradle Executable
      run: chmod +x Android/src/gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      working-directory: Android/src

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: Box-API-Debug-APK
        path: Android/src/app/build/outputs/apk/debug/app-debug.apk
